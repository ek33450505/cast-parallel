name: PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review the changed files in this PR for cast-parallel. Focus on:
            1. Worktree lifecycle: creation, cleanup, and error handling
            2. Signal trap correctness (INT/TERM cleanup)
            3. Subprocess guard (CAST_SUBPROCESS=1) enforcement
            4. No hardcoded paths — use $HOME or ~/
            Post findings as a PR comment. Cite file:line for each issue.
