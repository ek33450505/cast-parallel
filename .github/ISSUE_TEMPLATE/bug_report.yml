name: Bug Report
description: Report a bug or unexpected behavior in cast-parallel
labels: [bug]
title: "[Bug] "
body:
  - type: input
    id: version
    attributes:
      label: cast-parallel Version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options: [macOS, Linux]
    validations:
      required: true
  - type: input
    id: claude-version
    attributes:
      label: Claude Code Version
      placeholder: "e.g. 1.2.3"
  - type: dropdown
    id: phase
    attributes:
      label: Execution Phase
      options: [Plan parsing, Batch splitting, Worktree creation, Session launch, Session monitoring, Merge, Cleanup, other]
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Include git version, plan file excerpt, or worktree state if relevant
