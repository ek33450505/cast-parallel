name: Feature Request
description: Suggest a new feature for parallel plan execution
labels: [enhancement]
title: "[Feature] "
body:
  - type: dropdown
    id: feature-type
    attributes:
      label: Feature Type
      options: [Split Strategy, Merge Handling, Worktree Management, Logging, CLI Flag, Documentation, Other]
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed Behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: dropdown
    id: willing
    attributes:
      label: Willing to Implement?
      options: ["Yes", "No", "Maybe"]
